<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Tạo link khách mời · Wedding Xuân & Phượng</title>
  <style>
    :root {
      color-scheme: light;
      font-family: system-ui, sans-serif;
      --green: #214b3a;
      --cream: #f7f2e8;
    }
    * { box-sizing: border-box; }
    body {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 18px 80px;
      color: #203027;
      background: #fffdf8;
      line-height: 1.55;
    }
    h1 { color: var(--green); }
    form, .results {
      padding: 24px;
      border: 1px solid rgba(32, 75, 58, .18);
      border-radius: 18px;
      background: var(--cream);
    }
    label { display: grid; gap: 7px; margin-bottom: 18px; font-weight: 700; }
    input, textarea {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid rgba(32, 75, 58, .3);
      border-radius: 10px;
      background: white;
      font: inherit;
    }
    button {
      padding: 10px 15px;
      border: 0;
      border-radius: 999px;
      background: var(--green);
      color: white;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
    }
    button.secondary {
      border: 1px solid var(--green);
      background: transparent;
      color: var(--green);
    }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; }
    .results { margin-top: 22px; background: white; }
    .guest-row {
      display: grid;
      grid-template-columns: minmax(150px, .7fr) minmax(240px, 1.3fr) auto;
      gap: 10px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(32, 75, 58, .12);
    }
    .guest-row:last-child { border-bottom: 0; }
    .guest-link {
      overflow-wrap: anywhere;
      color: #37654f;
      font-size: .88rem;
    }
    .status { min-height: 1.5em; color: #37654f; }
    @media (max-width: 700px) {
      .guest-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Tạo link thiệp theo tên khách</h1>
    <p>
      Công cụ chạy hoàn toàn trong trình duyệt, không tải danh sách khách lên máy chủ.
      Nhập mỗi tên hoặc mỗi gia đình trên một dòng.
    </p>

    <form id="generatorForm">
      <label>
        Link thiệp gốc
        <input id="baseUrl" type="url"
          value="https://xuan2261.github.io/wedding-xuan-phuong/"
          required>
      </label>

      <label>
        Tên khách mời — mỗi dòng một tên
        <textarea id="guestNames" rows="10"
          placeholder="Gia đình cô Lan&#10;Anh Minh&#10;Nhóm bạn đại học"
          maxlength="12000" required></textarea>
      </label>

      <div class="actions">
        <button type="submit">Tạo link</button>
        <button class="secondary" type="button" id="copyAllButton" disabled>
          Sao chép tất cả
        </button>
        <button class="secondary" type="button" id="downloadCsvButton" disabled>
          Tải CSV
        </button>
      </div>
      <p class="status" id="status" role="status" aria-live="polite"></p>
    </form>

    <section class="results" id="results" aria-label="Danh sách link khách mời" hidden></section>
  </main>

  <script>
    (() => {
      "use strict";

      const form = document.querySelector("#generatorForm");
      const baseUrlInput = document.querySelector("#baseUrl");
      const namesInput = document.querySelector("#guestNames");
      const results = document.querySelector("#results");
      const status = document.querySelector("#status");
      const copyAllButton = document.querySelector("#copyAllButton");
      const downloadCsvButton = document.querySelector("#downloadCsvButton");
      let generated = [];

      const sanitize = (value) =>
        String(value || "")
          .replace(/[\u0000-\u001f\u007f]/g, " ")
          .replace(/\s+/g, " ")
          .trim()
          .slice(0, 80);

      const buildLink = (baseUrl, guestName) => {
        const url = new URL(baseUrl);
        url.hash = new URLSearchParams({ to: guestName }).toString();
        return url.toString();
      };

      const copyText = async (text) => {
        try {
          await navigator.clipboard.writeText(text);
          return true;
        } catch {
          window.prompt("Sao chép nội dung:", text);
          return false;
        }
      };

      const render = () => {
        results.replaceChildren();

        generated.forEach((item) => {
          const row = document.createElement("article");
          row.className = "guest-row";

          const name = document.createElement("strong");
          name.textContent = item.name;

          const link = document.createElement("span");
          link.className = "guest-link";
          link.textContent = item.url;

          const copyButton = document.createElement("button");
          copyButton.type = "button";
          copyButton.className = "secondary";
          copyButton.textContent = "Sao chép";
          copyButton.addEventListener("click", async () => {
            await copyText(item.url);
            status.textContent = `Đã xử lý link cho: ${item.name}`;
          });

          row.append(name, link, copyButton);
          results.append(row);
        });

        results.hidden = generated.length === 0;
        copyAllButton.disabled = generated.length === 0;
        downloadCsvButton.disabled = generated.length === 0;
      };

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        let baseUrl;
        try {
          baseUrl = new URL(baseUrlInput.value.trim()).toString();
        } catch {
          status.textContent = "Link thiệp gốc không hợp lệ.";
          return;
        }

        const uniqueNames = [...new Set(
          namesInput.value
            .split(/\r?\n/)
            .map(sanitize)
            .filter(Boolean)
        )];

        generated = uniqueNames.map((name) => ({
          name,
          url: buildLink(baseUrl, name)
        }));

        render();
        status.textContent = `Đã tạo ${generated.length} link cá nhân hóa.`;
      });

      copyAllButton.addEventListener("click", async () => {
        const text = generated
          .map((item) => `${item.name}\t${item.url}`)
          .join("\n");
        await copyText(text);
        status.textContent = "Đã xử lý danh sách link.";
      });

      downloadCsvButton.addEventListener("click", () => {
        const escapeCsv = (value) =>
          `"${String(value).replace(/"/g, '""')}"`;
        const csv = [
          ["Tên khách", "Link thiệp"],
          ...generated.map((item) => [item.name, item.url])
        ]
          .map((row) => row.map(escapeCsv).join(","))
          .join("\r\n");

        const blob = new Blob(["\ufeff", csv], {
          type: "text/csv;charset=utf-8"
        });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = "wedding-guest-links.csv";
        anchor.click();
        URL.revokeObjectURL(url);
      });
    })();
  </script>
</body>
</html>
