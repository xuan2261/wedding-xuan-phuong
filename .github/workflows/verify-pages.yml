name: Verify wedding site

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python verification dependencies
        run: python -m pip install --disable-pip-version-check pillow opencv-python-headless

      - name: Install browser verification dependencies
        run: |
          npm install --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Static release checks
        run: python tests/verify_release.py

      - name: Wedding data consistency
        run: python tests/consistency_check.py

      - name: Wishes contract check
        run: node tests/contract_check.js

      - name: Personalization utility check
        run: node tests/personalization_check.js

      - name: Image and QR decode
        run: python tests/verify_assets.py

      - name: JavaScript syntax
        run: |
          node --check app.js
          node --check config.js
          node --check guest-utils.js
          node --check tests/browser_smoke.mjs
          for file in tools/*.gs; do
            cp "$file" /tmp/apps-script-check.js
            node --check /tmp/apps-script-check.js
          done

      - name: Browser smoke
        run: npm run test:browser
