name: Verify and deploy wedding site

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install verification dependencies
        run: |
          python -m pip install --disable-pip-version-check pillow opencv-python-headless
          npm ci --no-audit --no-fund
          npx playwright install --with-deps chromium
      - name: Verify source
        run: |
          python tests/consistency_check.py
          python tests/verify_release.py
          node tests/multi_event_check.mjs
          node tests/opening_experience_check.mjs
          node tests/audio_story_regression_check.mjs
          node tests/story_asset_preload_check.mjs
          node tests/release_hardening_check.mjs
          python tests/guest_tool_check.py
          node tests/lifecycle_check.js
          node tests/contract_check.js
          node tests/personalization_check.js
          python tests/verify_assets.py
          node --check app.js
          node --check config.js
          node --check guest-utils.js
          node --check event-entry.js
          for file in tools/*.gs; do cp "$file" /tmp/apps-script-check.js; node --check /tmp/apps-script-check.js; done
      - name: Build and verify clean dist
        run: |
          python tools/build-dist.py
          python tests/share_entry_pages_check.py
          python tests/verify_dist.py
      - name: Browser smoke
        run: |
          npm run test:browser
          npm run test:audio-story-browser
      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify live build and event entry pages
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          EXPECTED_BUILD: v19.4-20260724
        run: |
          python - <<'PY'
          import json
          import os
          import time
          import urllib.request

          base = os.environ["PAGE_URL"].rstrip("/") + "/"
          expected = os.environ["EXPECTED_BUILD"]
          last_error = None
          for attempt in range(18):
              try:
                  request = urllib.request.Request(base, headers={"Cache-Control": "no-cache"})
                  with urllib.request.urlopen(request, timeout=20) as response:
                      html = response.read().decode("utf-8", "replace")
                  if expected not in html:
                      raise RuntimeError(f"root marker chưa cập nhật: {expected}")
                  with urllib.request.urlopen(base + "release.json?build=" + expected, timeout=20) as response:
                      release = json.load(response)
                  if release.get("buildId") != expected:
                      raise RuntimeError("release.json sai build")
                  for event_id in ["bride", "groom", "nhatrang", "saigon"]:
                      with urllib.request.urlopen(base + f"events/{event_id}/?build=" + expected, timeout=20) as response:
                          page = response.read().decode("utf-8", "replace")
                      if expected not in page or f'data-event-id="{event_id}"' not in page:
                          raise RuntimeError(f"event entry page sai: {event_id}")
                  print(f"PASS: live Pages đang chạy {expected}")
                  break
              except Exception as exc:
                  last_error = exc
                  if attempt == 17:
                      raise
                  print(f"Chờ Pages đồng bộ ({attempt + 1}/18): {exc}")
                  time.sleep(10)
          PY
